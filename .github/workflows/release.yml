name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0.0). Dry-run only — real releases come from tag pushes.'
        required: false
        default: '0.0.0.0'

jobs:
  build:
    name: Build, package, publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the manifest.json update back to main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jprm
        run: pip install --upgrade jprm

      - name: Fetch annotated tag objects
        # actions/checkout@v4 with fetch-depth: 0 grabs commits but does
        # NOT necessarily materialize annotated tag objects (the tag
        # name resolves to the commit, the tag's own metadata stays
        # remote). Without this explicit fetch, `git tag -l --format=
        # '%(contents)' v$VERSION` returns empty for annotated tags and
        # we silently fall back to the commit message — which becomes
        # the manifest's user-visible changelog. Force-fetch to be safe.
        if: startsWith(github.ref, 'refs/tags/v')
        run: git fetch --tags --force --prune origin

      - name: Determine version + changelog
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Pull the annotated tag's message body as the changelog
            # (`%(contents:body)` skips the subject line so we don't
            # double-up if the user repeats the version in the tag's
            # subject). Falls back to `%(contents)` (full message) if
            # the body is empty, then to the commit subject only as a
            # last resort. We deliberately do NOT fall back to the full
            # commit message — it tends to contain implementation detail
            # that confuses end-users reading the plugin catalog.
            CHANGELOG="$(git tag -l --format='%(contents:body)' "v$VERSION")"
            if [[ -z "$CHANGELOG" ]]; then
              CHANGELOG="$(git tag -l --format='%(contents)' "v$VERSION")"
            fi
            if [[ -z "$CHANGELOG" ]]; then
              # Lightweight tag (no annotation). Use commit *subject* only,
              # not the full message — keeps catalog text terse.
              CHANGELOG="$(git log -1 --pretty=%s "v$VERSION")"
            fi
            # Strip trailing blank lines.
            CHANGELOG="$(printf '%s' "$CHANGELOG" | sed -e :a -e '/^[[:space:]]*$/{$d;N;ba' -e '}')"
            if [[ -z "$CHANGELOG" ]]; then
              echo "::error::Tag v$VERSION has no annotation and no commit subject — refusing to publish with empty changelog. Re-tag with: git tag -a v$VERSION -m 'user-facing release notes'"
              exit 1
            fi
          else
            VERSION="${{ github.event.inputs.version }}"
            CHANGELOG="Dry-run build"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Multiline output via heredoc delimiter so newlines survive.
          {
            echo 'changelog<<YTT_CHANGELOG_EOF'
            echo "$CHANGELOG"
            echo 'YTT_CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"
          echo "----- Changelog (will be embedded in manifest.json) -----"
          echo "$CHANGELOG"
          echo "----- end changelog -----"

      - name: Patch build.yaml changelog
        # jprm reads build.yaml's `changelog:` field and embeds it into the
        # zip's meta.json, which `jprm repo add` then mirrors into
        # manifest.json. Patching the YAML in-place before build is the
        # cleanest way to inject per-release notes without touching jprm.
        run: |
          python3 <<'PY'
          import os
          path = 'Jellyfin.Plugin.YouTubeTrailers/build.yaml'
          changelog = os.environ['CHANGELOG'].rstrip() + '\n'
          # Hand-roll the rewrite to preserve YAML formatting / comments
          # we'd lose with a full PyYAML round-trip.
          with open(path) as f:
              lines = f.readlines()
          out = []
          i = 0
          while i < len(lines):
              if lines[i].startswith('changelog:'):
                  out.append('changelog: |\n')
                  for cl in changelog.splitlines():
                      out.append('  ' + cl + '\n')
                  # Skip the existing changelog block (any indented continuation lines).
                  i += 1
                  while i < len(lines) and (lines[i].startswith('  ') or lines[i].strip() == ''):
                      i += 1
                  continue
              out.append(lines[i])
              i += 1
          with open(path, 'w') as f:
              f.writelines(out)
          print(f'Patched {path} with {len(changelog.splitlines())} changelog lines')
          PY
        env:
          CHANGELOG: ${{ steps.version.outputs.changelog }}

      - name: Build plugin zip
        id: build
        run: |
          # jprm reads build.yaml from the project subdir (now patched with
          # the real per-release changelog), runs dotnet publish, writes
          # <name>_<version>.zip + .md5sum + .meta.json into ./artifacts/.
          mkdir -p artifacts
          jprm --verbosity=debug plugin build \
            --version="${{ steps.version.outputs.version }}" \
            Jellyfin.Plugin.YouTubeTrailers
          ZIP=$(ls artifacts/*.zip | head -1)
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Built: $ZIP"
          ls -la artifacts/

      - name: Update manifest.json on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ZIP_NAME=$(basename "${{ steps.build.outputs.zip }}")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${ZIP_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Land the manifest commit on main, not the tag — rebase in case main
          # moved during the build.
          git fetch origin main
          git checkout -B main origin/main

          jprm repo add . "${{ steps.build.outputs.zip }}" --plugin-url="$DOWNLOAD_URL"

          if git diff --quiet manifest.json; then
            echo "manifest.json unchanged"
          else
            git add manifest.json
            git commit -m "Publish ${{ github.ref_name }} to manifest"
            git push origin main
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip }}
          generate_release_notes: true
          fail_on_unmatched_files: true
